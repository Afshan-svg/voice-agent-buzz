# Render Blueprint — deploy via Dashboard: New > Blueprint > connect repo
# Docs: https://render.com/docs/blueprint-spec
#
# Plans below use Render FREE tier (good for testing/hobby).
# For production: change plan to "starter" on web, redis, and buzznessai-db.

services:
  - type: web
    name: buzznessai-hotel
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: buzznessai-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buzznessai-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_VALIDATE_SIGNATURE
        value: "true"
      - key: HOTEL_NAME
        value: BuzznessAI Luxury Hotel
      # Set these manually in the Render dashboard after deploy:
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TWILIO_HUMAN_TRANSFER_NUMBER
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false

  - type: redis
    name: buzznessai-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: buzznessai-db
    plan: free
    postgresMajorVersion: "16"
